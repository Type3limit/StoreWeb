<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F59E0B">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="static/icon.svg" type="image/svg+xml">
<title>StoreWeb - 仓储管理</title>
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <span class="nav-brand">StoreWeb</span>
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-tab="overview">商品总览</button>
      <button class="nav-tab" data-tab="dashboard">仪表盘</button>
      <button class="nav-tab" data-tab="products">商品管理</button>
      <button class="nav-tab" data-tab="stock">库存管理</button>
      <button class="nav-tab" data-tab="sales">销售记录</button>
      <button class="nav-tab" data-tab="help">帮助</button>
      <button class="nav-tab" data-tab="settings">设置</button>
    </div>
  </div>
</nav>

<main class="main">

  <!-- Overview (default POS page) -->
  <section id="tab-overview" class="tab-panel active">
    <div class="toolbar">
      <input type="text" class="input" id="overview-search" placeholder="搜索商品...">
    </div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="overview-grid" id="overview-grid"></div>
  </section>

  <!-- Dashboard -->
  <section id="tab-dashboard" class="tab-panel">
    <div class="stat-grid" id="stats"></div>
    <div class="dash-row">
      <div class="card">
        <div class="card-header">今日结算</div>
        <div class="card-body" id="settlement"></div>
      </div>
      <div class="card">
        <div class="card-header">今日热销 TOP3</div>
        <div class="card-body" id="top-products"></div>
      </div>
    </div>
    <div class="dash-row" style="margin-top:16px">
      <div class="card">
        <div class="card-header">低库存预警</div>
        <div class="card-body" id="low-stock"></div>
      </div>
      <div class="card">
        <div class="card-header">最近销售</div>
        <div class="card-body" id="recent-sales"></div>
      </div>
    </div>
  </section>

  <!-- Products -->
  <section id="tab-products" class="tab-panel">
    <div class="toolbar">
      <input type="text" class="input" id="product-search" placeholder="搜索商品名称或分类...">
      <div class="btn-group">
        <button class="btn" id="btn-batch-price">全场调价</button>
        <button class="btn btn-primary" id="btn-add-product">+ 添加商品</button>
      </div>
    </div>
    <div class="card">
      <div class="card-body table-wrap">
        <table class="pc-table">
          <thead>
            <tr>
              <th>封面</th><th>名称</th><th>分类</th><th>成本价</th><th>售价</th><th>库存</th><th>单位</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="product-list"></tbody>
        </table>
        <div class="mobile-list" id="product-cards"></div>
      </div>
    </div>
  </section>

  <!-- Stock -->
  <section id="tab-stock" class="tab-panel">
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">商品库存 · 快捷操作</div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>商品</th><th>库存</th><th>单位</th><th>操作</th></tr></thead>
          <tbody id="stock-products"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header">最近记录</div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>商品</th><th>类型</th><th>数量</th><th>备注</th><th>时间</th></tr></thead>
          <tbody id="stock-list"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Sales -->
  <section id="tab-sales" class="tab-panel">
    <div class="toolbar">
      <span></span>
      <div class="btn-group">
        <button class="btn" id="btn-export-today">导出今日</button>
        <button class="btn" id="btn-export-all">导出全部</button>
        <button class="btn btn-primary" id="btn-add-sale">+ 记录销售</button>
      </div>
    </div>
    <div class="card">
      <div class="card-body table-wrap">
        <table>
          <thead>
            <tr>
              <th>商品</th><th>数量</th><th>金额</th><th>备注</th><th>时间</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="sale-list"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Help -->
  <section id="tab-help" class="tab-panel">
    <div class="help-content" id="help-content"></div>
  </section>

  <!-- Settings -->
  <section id="tab-settings" class="tab-panel">
    <div class="settings-header">
      <h2>主题设置</h2>
      <p>选择一个外观风格</p>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
  </section>

</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<div class="cart-fab" id="cart-fab" style="display:none">
  <span id="cart-count">0</span>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="static/js/app.js"></script>
</body>
</html>
